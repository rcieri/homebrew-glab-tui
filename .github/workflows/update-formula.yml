name: Update formula

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release
        id: release
        run: |
          tag=$(gh release view --repo rcieri/glab-tui --json tagName --jq .tagName)
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check current formula version
        id: current
        run: |
          if [ -f Formula/glab-tui.rb ]; then
            current=$(grep -oP 'download/v\K[0-9]+\.[0-9]+\.[0-9]+' Formula/glab-tui.rb | head -1)
            echo "version=$current" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula
        # if: steps.current.outputs.version != steps.release.outputs.version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REPO="rcieri/glab-tui"

          ASSETS="
          glab-tui-linux-amd64.tar.gz
          glab-tui-linux-arm64.tar.gz
          glab-tui-macos-amd64.tar.gz
          glab-tui-macos-arm64.tar.gz
          glab-tui-windows-amd64.zip
          "

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT INT TERM

          for asset in $ASSETS; do
            curl -sSfL "https://github.com/${REPO}/releases/download/${TAG}/${asset}" -o "${TMPDIR}/${asset}"
          done

          LINUX_AMD64=$(sha256sum "${TMPDIR}/glab-tui-linux-amd64.tar.gz" | cut -d' ' -f1)
          LINUX_ARM64=$(sha256sum "${TMPDIR}/glab-tui-linux-arm64.tar.gz" | cut -d' ' -f1)
          MACOS_AMD64=$(sha256sum "${TMPDIR}/glab-tui-macos-amd64.tar.gz" | cut -d' ' -f1)
          MACOS_ARM64=$(sha256sum "${TMPDIR}/glab-tui-macos-arm64.tar.gz" | cut -d' ' -f1)

          sed -i "s|/download/v[0-9.]*/glab-tui-|/download/${TAG}/glab-tui-|g" Formula/glab-tui.rb
          sed -i "/glab-tui-macos-amd64/,/sha256/{s/sha256 \"[a-f0-9]*\"/sha256 \"${MACOS_AMD64}\"/}" Formula/glab-tui.rb
          sed -i "/glab-tui-macos-arm64/,/sha256/{s/sha256 \"[a-f0-9]*\"/sha256 \"${MACOS_ARM64}\"/}" Formula/glab-tui.rb
          sed -i "/glab-tui-linux-amd64/,/sha256/{s/sha256 \"[a-f0-9]*\"/sha256 \"${LINUX_AMD64}\"/}" Formula/glab-tui.rb
          sed -i "/glab-tui-linux-arm64/,/sha256/{s/sha256 \"[a-f0-9]*\"/sha256 \"${LINUX_ARM64}\"/}" Formula/glab-tui.rb

      - name: Commit and push
        # if: steps.current.outputs.version != steps.release.outputs.version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/glab-tui.rb
          git commit -m "Update glab-tui to ${{ steps.release.outputs.tag }}"
          git push
